name: Deploy Static HTML Site

on:
  push:
    branches:
      - main  # Trigger deployment when pushing to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Set Up SSH Key Configuration
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.MYSERVER }}  # Matches your exact secret name
          name: id_ed25519             # CRITICAL FIX: Explicitly defines the ED25519 key format
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Trust Server Public Fingerprint
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Push Files Directly to Absolute Path via Rsync
        run: |
          rsync -avz --delete \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude '.user.ini' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/www/wwwroot/awstest.work.gd/

      - name: Fix Directory Ownership Safely
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "sudo find /www/wwwroot/awstest.work.gd -name '.user.ini' -prune -o -exec chown www:www {} + && sudo find /www/wwwroot/awstest.work.gd -name '.user.ini' -prune -o -exec chmod 755 {} +"
